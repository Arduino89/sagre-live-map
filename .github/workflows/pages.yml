name: Publish Sagre Live Map

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "demo-mobile.html"
      - "events.json"
      - "zones.json"
      - "publication_manifest.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate public bundle
        run: |
          test -s index.html
          test -s events.json
          test -s zones.json
          python -m json.tool events.json >/dev/null
          python -m json.tool zones.json >/dev/null
          if [ -f publication_manifest.json ]; then
            python -m json.tool publication_manifest.json >/dev/null
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp events.json _site/events.json
          cp zones.json _site/zones.json
          if [ -f demo-mobile.html ]; then cp demo-mobile.html _site/demo-mobile.html; fi
          if [ -f publication_manifest.json ]; then cp publication_manifest.json _site/publication_manifest.json; fi
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
